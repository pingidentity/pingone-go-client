openapi: 3.1.1
info:
  contact:
    email: devex@pingidentity.com
    name: Ping Identity Developer Experiences
    url: https://developer.pingidentity.com
  description: PingOne is a cloud-based framework for secure identity access management.
    The PingOne API gives developers the tools to integrate enterprise and third-party
    applications with the PingOne platform.
  license:
    name: Apache 2.0
  title: PingOne Platform User and Configuration Management API - SDK Generator
  version: 2026.04.21-beta
servers:
- url: "https://api.pingone.{tld}/{basePath}"
  variables:
    basePath:
      default: v1
    tld:
      default: com
      enum:
      - eu
      - com
      - asia
      - com.au
      - ca
      - sg
security:
- bearerAuth: []
- oauth2: []
tags:
- description: Operations for managing PingOne configuration management actions.
  name: Configuration Management
- description: Operations for managing DaVinci applications and application flows
    policies
  name: DaVinci Applications
- description: Operations for managing DaVinci connectors and connector instances
  name: DaVinci Connectors
- description: Operations for managing DaVinci flow versions
  name: DaVinci Flow Versions
- description: Operations for managing DaVinci flows
  name: DaVinci Flows
- description: Operations for managing DaVinci variables
  name: DaVinci Variables
- description: Operations for retrieving PingOne directory total identity reports
  name: Directory Total Identities
- description: Operations for managing PingOne environments
  name: Environments
- description: Operations for managing flow policies that attach to PingOne applications
  name: Flow Policies
paths:
  /environments:
    get:
      operationId: getEnvironments
      parameters:
      - explode: true
        in: query
        name: expand
        required: false
        schema:
          type: string
        style: form
        x-description-python-sdk: Specifies whether the `billOfMaterials` embedded
          resource is included in each environment response.
        x-description-typescript-sdk: Determines whether the `billOfMaterials` embedded
          resource is included in each environment response (boolean).
        x-description-go-sdk: Controls whether the billOfMaterials embedded resource
          is included in each environment response.
      - explode: true
        in: query
        name: filter
        required: false
        schema:
          type: string
        style: form
        x-description-python-sdk: "Filter the returned collection of environments\
          \ by SCIM expressions such as `name sw`, `id eq`, `organization.id eq`,\
          \ `license.id eq`, or `status eq`."
        x-description-typescript-sdk: "Call this method to filter the list of environments\
          \ using SCIM expressions such as `name sw`, `id eq`, `organization.id eq`,\
          \ `license.id eq`, or `status eq`. The returned collection reflects these\
          \ filters."
        x-description-go-sdk: "Filters the list of environments by SCIM expressions\
          \ such as `name sw`, `id eq`, `organization.id eq`, `license.id eq`, or\
          \ `status eq`, affecting the returned collection."
      - explode: true
        in: query
        name: order
        required: false
        schema:
          type: string
        style: form
        x-description-python-sdk: "Specifies the sort order of returned environments,\
          \ such as `asc` or `desc`, influencing the sequence of items in the returned\
          \ object."
        x-description-typescript-sdk: "Specifies the sort order of returned environments,\
          \ such as `asc` or `desc`, influencing the sequence of items in the returned\
          \ object."
        x-description-go-sdk: "Specifies the sort order of returned environments,\
          \ such as `asc` or `desc`, influencing the sequence of items in the result."
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 1000
          format: int32
          maximum: 5000
          minimum: 1
          type: integer
        style: form
        x-description-python-sdk: "Specifies the maximum number of environment resources\
          \ returned (int). The default value is 1000, and the allowed range is 1\
          \ to 5000."
        x-description-typescript-sdk: "Specifies the maximum number of environment\
          \ resources returned (number), defaulting to 1000, and must be between 1\
          \ and 5000."
        x-description-go-sdk: "Specifies the maximum number of environment resources\
          \ returned, defaulting to `1000` and ranging from `1` to `5000`."
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
        x-description-python-sdk: Specifies the pagination cursor used to retrieve
          the next page of environment resources.
        x-description-typescript-sdk: Specifies the pagination cursor used to retrieve
          the next page of environment resources.
        x-description-go-sdk: Specifies the pagination cursor to retrieve the next
          page of environment resources.
      - $ref: "#/components/parameters/com.pingidentity.header.ExternalSessionID"
      - $ref: "#/components/parameters/com.pingidentity.header.ExternalTransactionID"
