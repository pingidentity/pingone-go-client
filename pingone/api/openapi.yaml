        "400":
          $ref: "#/components/responses/http.400.BadRequest"
        "401":
          $ref: "#/components/responses/http.401.Unauthorized"
        "403":
          $ref: "#/components/responses/http.403.Forbidden"
        "404":
          $ref: "#/components/responses/http.404.NotFound"
        "429":
          $ref: "#/components/responses/http.429.TooManyRequests"
        "500":
          $ref: "#/components/responses/http.500.InternalServerError"
        "502":
          $ref: "#/components/responses/http.502.BadGateway"
        "503":
          $ref: "#/components/responses/http.503.ServiceUnavailable"
      tags:
      - Environments
      x-permission: orgmgt:read:environment
      x-pingidentity-paginatedresponse: true
      x-summary-python-sdk: Retrieves a list of environments.
      x-summary-typescript-sdk: Retrieves a list of environments.
      x-summary-go-sdk: ListEnvironments retrieves a list of environments.
      x-description-python-sdk: "Calls the method to retrieve all environment resources\
        \ for the organization, optionally filtered by SCIM expressions, with support\
        \ for cursor-based pagination. The `limit` parameter (int, 1–500) caps the\
        \ number of results. When used with `filter` expressions other than `organization.id`\
        \ or `license.id` eq, `limit` is ignored. You can expand the embedded `bill_of_materials`\
        \ to view licensed product details. Requires the `orgmgt:read:environment`\
        \ permission."
      x-description-typescript-sdk: "Calls the method to retrieve all environment\
        \ resources for the organization, optionally filtered by SCIM expressions,\
        \ with support for cursor-based pagination. The `limit` parameter (number,\
        \ 1–500) caps the number of results. When used with `filter` expressions other\
        \ than `organization.id` or `license.id` eq, `limit` is ignored. You can expand\
        \ the embedded `billOfMaterials` to view licensed product details. Requires\
        \ the `orgmgt:read:environment` permission."
      x-description-go-sdk: "ListEnvironments retrieves all environment resources\
        \ for the organization, optionally filtered by SCIM expressions, and supports\
        \ cursor-based pagination. The Limit parameter (1–500) caps the number of\
        \ results. When used with Filter expressions other than organization.id or\
        \ license.id eq, Limit is ignored. The embedded BillOfMaterials can be expanded\
        \ to view licensed product details. Requires the orgmgt:read:environment permission."
    post:
      operationId: createEnvironment
