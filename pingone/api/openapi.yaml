      - $ref: "#/components/parameters/com.pingidentity.header.ExternalSessionID"
      - $ref: "#/components/parameters/com.pingidentity.header.ExternalTransactionID"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnvironmentCreateRequest"
        required: true
      responses:
        "201":
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/EnvironmentResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentResponse"
          description: Successfully created.
          headers:
            Location:
              explode: false
              schema:
                type: string
              style: simple
        "400":
          $ref: "#/components/responses/http.400.BadRequest"
        "401":
          $ref: "#/components/responses/http.401.Unauthorized"
        "403":
          $ref: "#/components/responses/http.403.Forbidden"
        "404":
          $ref: "#/components/responses/http.404.NotFound"
        "429":
          $ref: "#/components/responses/http.429.TooManyRequests"
        "500":
          $ref: "#/components/responses/http.500.InternalServerError"
        "502":
          $ref: "#/components/responses/http.502.BadGateway"
        "503":
          $ref: "#/components/responses/http.503.ServiceUnavailable"
      tags:
      - Environments
      x-permission: orgmgt:create:environment
      x-summary-python-sdk: "Creates an environment with the specified name, region,\
        \ type, and bill_of_materials."
      x-summary-typescript-sdk: "Creates an environment with the specified name, region,\
        \ type, and billOfMaterials."
      x-summary-go-sdk: "CreateEnvironment creates an environment with the specified\
        \ Name, Region, Type, and BillOfMaterials."
      x-description-python-sdk: "Calls the method to create a new environment tied\
        \ to the organization in the access token. Requires the `orgmgt:create:environment`\
        \ permission. When the organization holds a trial license, attempts to create\
        \ `PRODUCTION` environments or promote `SANDBOX` environments to `PRODUCTION`\
        \ are rejected. The appropriate `license.id` must first be retrieved using\
        \ the method to read all licenses."
      x-description-typescript-sdk: "Calls the method to create a new environment\
        \ tied to the organization in the access token. Requires the orgmgt:create:environment\
