        "200":
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/EnvironmentsCollectionResponse"
            application/json:
              schema:
                $ref: "#/components/schemas/EnvironmentsCollectionResponse"
          description: Successful operation. This is also returned if the collection
